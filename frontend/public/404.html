<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScadaTech</title>
    <script>
      // Redirect to index with the path encoded as query param
      const path = window.location.pathname.replace('/www.scadatech.site', '') || '/'
      const search = window.location.search
      const hash = window.location.hash
      const redirect = '/www.scadatech.site/?p=' + encodeURIComponent(path + search) + hash
      window.location.replace(redirect)
    </script>
  </head>
  <body></body>
</html>
